<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATOR RAMPAGE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #renderCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            touch-action: none;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <!-- Babylon.js 6.x -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

    <!-- Game data (unchanged) -->
    <script src="src/constants.js"></script>
    <script src="src/levelData.js"></script>

    <!-- Babylon game scripts (load order matters) -->
    <script src="src/babylon/Input.js"></script>
    <script src="src/babylon/Collision.js"></script>
    <script src="src/babylon/World.js"></script>
    <script src="src/babylon/HUD.js"></script>
    <script src="src/babylon/CameraFollower.js"></script>
    <script src="src/babylon/entities/Player3D.js"></script>
    <script src="src/babylon/entities/Enemy3D.js"></script>
    <script src="src/babylon/entities/Boss3D.js"></script>
    <script src="src/babylon/screens/TitleScreen.js"></script>
    <script src="src/babylon/screens/GameOverScreen.js"></script>
    <script src="src/babylon/screens/VictoryScreen.js"></script>
    <script src="src/babylon/GameManager.js"></script>
    <script src="src/babylon/engine.js"></script>
</body>
</html>
